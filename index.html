<title>Beaumont Street Menus</title>
<style>
  :root {
    --bg: #0f1115;
    --surface: #1a1d24;
    --surface-hover: #22262f;
    --border: #2a2e38;
    --text: #e8e9ec;
    --text-muted: #8b8f9a;
    --accent: #e85d3a;
    --accent-hover: #f06a48;
    --tag-gf: #2d6a4f;
    --tag-spicy: #9d3a1a;
    --tag-veg: #5a7a2e;
    --card-shadow: 0 2px 8px rgba(0,0,0,0.3);
    --tag-gf-text: #a8e6cf;
    --tag-spicy-text: #ffb299;
    --tag-veg-text: #c5e07c;
    --tag-restaurant-bg: rgba(255,255,255,0.06);
  }

  [data-theme="light"] {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --surface-hover: #f0f1f3;
    --border: #d8dbe0;
    --text: #1a1d24;
    --text-muted: #5f6470;
    --accent: #d14b28;
    --accent-hover: #c04020;
    --tag-gf: #d6f0e2;
    --tag-spicy: #fde0d6;
    --tag-veg: #e4f0c8;
    --card-shadow: 0 2px 8px rgba(0,0,0,0.08);
    --tag-gf-text: #1a6b42;
    --tag-spicy-text: #9d3a1a;
    --tag-veg-text: #3d5a14;
    --tag-restaurant-bg: rgba(0,0,0,0.05);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    padding: 2rem 1.5rem 0;
    max-width: 1200px;
    margin: 0 auto;
  }

  header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  header p {
    color: var(--text-muted);
    margin-top: 0.25rem;
    font-size: 0.95rem;
  }

  .controls {
    max-width: 1200px;
    margin: 1.5rem auto 0;
    padding: 0 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    align-items: center;
  }

  .meal-tabs {
    display: flex;
    background: var(--surface);
    border-radius: 10px;
    padding: 4px;
    gap: 2px;
  }

  .meal-tab {
    padding: 0.5rem 1.25rem;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 0.9rem;
    font-weight: 500;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .meal-tab.active {
    background: var(--accent);
    color: #fff;
  }

  .meal-tab:hover:not(.active) {
    color: var(--text);
    background: var(--surface-hover);
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-box svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    width: 16px;
    height: 16px;
  }

  .search-box input {
    width: 100%;
    padding: 0.6rem 0.75rem 0.6rem 2.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input::placeholder { color: var(--text-muted); }
  .search-box input:focus { border-color: var(--accent); }

  .filter-group {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 0.5rem 1rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 0.8rem;
    font-weight: 500;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232, 93, 58, 0.1);
  }

  .filter-btn:hover:not(.active) {
    border-color: #444;
    color: var(--text);
  }

  .restaurant-filter {
    position: relative;
  }

  .restaurant-filter select {
    appearance: none;
    padding: 0.55rem 2rem 0.55rem 0.85rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 0.9rem;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }

  .restaurant-filter select:focus { border-color: var(--accent); }

  .restaurant-filter::after {
    content: '';
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 5px solid var(--text-muted);
    pointer-events: none;
  }

  .results-info {
    max-width: 1200px;
    margin: 1rem auto 0;
    padding: 0 1.5rem;
    color: var(--text-muted);
    font-size: 0.85rem;
  }

  .menu-grid {
    max-width: 1200px;
    margin: 1rem auto 2rem;
    padding: 0 1.5rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(340px, 100%), 1fr));
    gap: 1rem;
  }

  .category-header {
    grid-column: 1 / -1;
    margin-top: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
  }

  .category-header:first-child { margin-top: 0; }

  .category-header h2 {
    font-size: 1.15rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .category-header .count {
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  .menu-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.1rem 1.25rem;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .menu-card:hover {
    border-color: #3a3e48;
    background: var(--surface-hover);
    box-shadow: var(--card-shadow);
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 0.75rem;
  }

  .card-top h3 {
    font-size: 0.95rem;
    font-weight: 600;
    line-height: 1.3;
  }

  .price-range {
    font-size: 0.8rem;
    color: var(--accent);
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .card-desc {
    font-size: 0.83rem;
    color: var(--text-muted);
    line-height: 1.45;
  }

  .card-meta {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    align-items: center;
    margin-top: 0.15rem;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    padding: 0.15rem 0.5rem;
    border-radius: 5px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  .tag-gf { background: var(--tag-gf); color: var(--tag-gf-text); }
  .tag-spicy { background: var(--tag-spicy); color: var(--tag-spicy-text); }
  .tag-vegetarian { background: var(--tag-veg); color: var(--tag-veg-text); }
  .tag-restaurant {
    background: var(--tag-restaurant-bg);
    color: var(--text-muted);
    font-weight: 500;
  }

  .pricing-detail {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0.15rem 0.75rem;
    font-size: 0.78rem;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    padding-top: 0.5rem;
    margin-top: 0.15rem;
  }

  .pricing-detail .price-val {
    text-align: right;
    color: var(--text);
    font-weight: 500;
  }

  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 3rem;
    color: var(--text-muted);
  }

  .no-results p:first-child {
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
  }

  .price-toggle {
    padding: 0.5rem 1rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 0.8rem;
    font-weight: 500;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .price-toggle.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232, 93, 58, 0.1);
  }

  [data-theme="light"] .menu-card:hover {
    border-color: #c0c4cc;
  }

  [data-theme="light"] .restaurant-filter select {
    background: var(--surface);
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.85rem;
    margin-bottom: 0.75rem;
    transition: color 0.2s;
  }

  .back-link:hover { color: var(--accent); }

  .theme-toggle {
    padding: 0.5rem 1rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 0.8rem;
    font-weight: 500;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    margin-left: auto;
  }

  .theme-toggle:hover {
    border-color: #444;
    color: var(--text);
  }

  [data-theme="light"] .theme-toggle:hover {
    border-color: #aaa;
  }

  @media (max-width: 600px) {
    .menu-grid { grid-template-columns: 1fr; padding: 0 1rem; }
    .controls { gap: 0.5rem; padding: 0 1rem; }
    header { padding: 1.25rem 1rem 0; }
    header h1 { font-size: 1.4rem; }
    header p { font-size: 0.85rem; }
    .results-info { padding: 0 1rem; }

    .search-box { min-width: 0; flex-basis: 100%; order: 1; }
    .search-box input { font-size: 16px; }
    .restaurant-filter { flex-basis: 100%; order: 2; }
    .restaurant-filter select { width: 100%; font-size: 16px; }
    .meal-tabs { order: 0; }
    .filter-group { order: 3; flex-basis: 100%; }
    .price-toggle { order: 4; }
    .theme-toggle { order: 5; margin-left: 0; }
  }
</style>
</head>

  { name:"Churros", description:"Freshly made churros", category:"Sweet", restaurant:"guzman-y-gomez", meal, tags:["vegetarian"], prices:{"":5.50} },
  { name:"GYG Sundae", description:"Soft serve sundae with toppings", category:"Sweet", restaurant:"guzman-y-gomez", meal, tags:["vegetarian"], prices:{"":5.50} },
  { name:"Churro Burrito", description:"Churro wrapped burrito-style with sweet fillings", category:"Sweet", restaurant:"guzman-y-gomez", meal, tags:["vegetarian"], prices:{"":7.00} },

  // --- Kids Menu ---
  { name:"Little G's Meal", description:"Choice of burrito or 2 tacos, served with apple juice (250ml) or kids frozen (330ml) and water", category:"Kids Menu", restaurant:"guzman-y-gomez", meal, tags:[], prices:{"":11.50} },

  // --- Drinks ---
  { name:"Soft Drink", description:"Soft drink", category:"Drinks", restaurant:"guzman-y-gomez", meal, tags:["vegetarian"], prices:{"390ml":4.00,"600ml":5.40} },
  { name:"Water", description:"Bottled water", category:"Drinks", restaurant:"guzman-y-gomez", meal, tags:["vegetarian"], prices:{"":4.00} },
  { name:"Sparkling Water", description:"Sparkling water", category:"Drinks", restaurant:"guzman-y-gomez", meal, tags:["vegetarian"], prices:{"":4.10} },
  { name:"Juice / Iced Tea", description:"Juice or iced tea", category:"Drinks", restaurant:"guzman-y-gomez", meal, tags:["vegetarian"], prices:{"":5.00} },
  { name:"Coffee", description:"Barista-made coffee — hot beverages with any milk may contain milk, soy, almond and gluten", category:"Drinks", restaurant:"guzman-y-gomez", meal, tags:["vegetarian"], prices:{"Med":4.50,"Lrg":5.50} },
  ])
);

// Restaurant display names
const restaurantNames = {
  "the-grain": "The Grain",
  "eight-buns": "Eight Buns",
  "cappadocia": "Cappadocia",
  "sushi-revolution": "Sushi Revolution",
  "in-forno": "In Forno",
  "rajs-corner": "Raj's Corner",
  "son-of-a-gun": "Son Of A Gun",
  "guzman-y-gomez": "Guzman Y Gomez"
};

// Read restaurant from URL param
const urlParams = new URLSearchParams(window.location.search);
const urlRestaurant = urlParams.get("restaurant") || "all";

// Update page title if single restaurant
const pageTitle = document.getElementById("pageTitle");
const pageSub = document.getElementById("pageSubtitle");
if (urlRestaurant !== "all" && restaurantNames[urlRestaurant]) {
  pageTitle.textContent = restaurantNames[urlRestaurant];
  pageSub.textContent = "Search and filter the menu";
}

// State
let activeMeal = "lunch";
let activeRestaurant = urlRestaurant;
let searchQuery = "";
let activeFilters = new Set();
let showPrices = false;

// DOM
const grid = document.getElementById("menuGrid");
const info = document.getElementById("resultsInfo");
const searchInput = document.getElementById("searchInput");
const restaurantSelect = document.getElementById("restaurantFilter");
const priceToggle = document.getElementById("priceToggle");

// Sync dropdown with URL param
restaurantSelect.value = urlRestaurant;

// Render
function render() {
  let items = menuData.filter(item => {
    if (item.meal !== activeMeal) return false;
    if (activeRestaurant !== "all" && item.restaurant !== activeRestaurant) return false;
    if (activeFilters.has("gf") && !item.tags.includes("gf")) return false;
    if (activeFilters.has("spicy") && !item.tags.includes("spicy")) return false;
    if (activeFilters.has("vegetarian") && !item.tags.includes("vegetarian")) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const haystack = (item.name + " " + item.description + " " + item.category).toLowerCase();
      // Support multiple search terms (all must match)
      const terms = q.split(/\s+/).filter(Boolean);
      if (!terms.every(t => haystack.includes(t))) return false;
    }
    return true;
  });

  // Group by category
  const grouped = {};
  const categoryOrder = [
    "Entrees & Sides", "Salads", "Pizzas", "Pastas", "Risotto", "Mains", "Kids Menu", "Desserts",
    "Sushi Rolls", "Nigiri", "Ships & Cupcakes", "Sashimi", "Fry Menu", "Entree",
    "Rice Meals", "Donburi", "Japanese Curry", "Udon", "Ramen", "Party Platters",
    "Pides", "Kebab Rolls", "Kebab Combos", "Kebab Packs", "Snack Packs", "Burgers",
    "Buns & Dumplings", "Roti", "Cold Dish & Sizzling", "Snacks (Must Try)",
    "Noodles", "Fried Rices", "Fried Rice", "Stir Fry", "Curry",
    "Chicken", "Beef", "Pork", "Fish", "Seafood", "Tofu",
    "Omelette & Vegetable", "Soups & Desserts", "Sides", "Extras",
    "Combos", "Indian Entrees", "Chicken Curries", "Lamb Curries", "Beef Curries",
    "Seafood Curries", "Vegetable Curries", "Special Dishes", "Rice & Biryani",
    "Breads", "Indian Sides", "Indian Sweets", "Beverages",
    "Breakfast", "Share Plates", "Loaded Fries", "Tacos", "Bowls", "Smokehouse",
    "Burritos & Bowls", "Nachos & Loaded Fries", "Snacks", "Sweet", "Drinks"
  ];
  items.forEach(item => {
    if (!grouped[item.category]) grouped[item.category] = [];
    grouped[item.category].push(item);
  });

  info.textContent = `Showing ${items.length} dish${items.length !== 1 ? "es" : ""}` +
    (activeRestaurant !== "all" ? ` from ${restaurantNames[activeRestaurant]}` : "") +
    (searchQuery ? ` matching "${searchQuery}"` : "");

  if (items.length === 0) {
    grid.innerHTML = `<div class="no-results"><p>No dishes found</p><p>Try adjusting your search or filters</p></div>`;
    return;
  }

  let html = "";
  categoryOrder.forEach(cat => {
    if (!grouped[cat]) return;
    const catItems = grouped[cat];
    html += `<div class="category-header"><h2>${cat}</h2><span class="count">${catItems.length} dish${catItems.length !== 1 ? "es" : ""}</span></div>`;
    catItems.forEach(item => {
      const minPrice = Math.min(...Object.values(item.prices));
      const maxPrice = Math.max(...Object.values(item.prices));
      const priceLabel = minPrice === maxPrice ? `$${minPrice.toFixed(2)}` : `$${minPrice.toFixed(2)}\u2013$${maxPrice.toFixed(2)}`;

      let tagsHtml = "";
      if (item.tags.includes("gf")) tagsHtml += `<span class="tag tag-gf">GF</span>`;
      if (item.tags.includes("spicy")) tagsHtml += `<span class="tag tag-spicy">Spicy</span>`;
      if (item.tags.includes("vegetarian")) tagsHtml += `<span class="tag tag-vegetarian">Veg</span>`;
      tagsHtml += `<span class="tag tag-restaurant">${restaurantNames[item.restaurant]}</span>`;

      let pricingHtml = "";
      const priceEntries = Object.entries(item.prices);
      const hasSinglePrice = priceEntries.length === 1 && priceEntries[0][0] === "";
      if (showPrices && !hasSinglePrice) {
        pricingHtml = `<div class="pricing-detail">`;
        for (const [label, price] of priceEntries) {
          pricingHtml += `<span>${label}</span><span class="price-val">$${price.toFixed(2)}</span>`;
        }
        pricingHtml += `</div>`;
      }

      html += `
        <div class="menu-card">
          <div class="card-top">
            <h3>${item.name}</h3>
            <span class="price-range">${priceLabel}</span>
          </div>
          <p class="card-desc">${item.description}</p>
          <div class="card-meta">${tagsHtml}</div>
          ${pricingHtml}
        </div>`;
    });
  });

  grid.innerHTML = html;
}

// Event listeners
document.querySelectorAll(".meal-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".meal-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    activeMeal = tab.dataset.meal;
    render();
  });
});

restaurantSelect.addEventListener("change", () => {
  activeRestaurant = restaurantSelect.value;
  render();
});

searchInput.addEventListener("input", () => {
  searchQuery = searchInput.value.trim();
  render();
});

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const f = btn.dataset.filter;
    if (activeFilters.has(f)) {
      activeFilters.delete(f);
      btn.classList.remove("active");
    } else {
      activeFilters.add(f);
      btn.classList.add("active");
    }
    render();
  });
});

priceToggle.addEventListener("click", () => {
  showPrices = !showPrices;
  priceToggle.classList.toggle("active", showPrices);
  priceToggle.textContent = showPrices ? "Hide Prices" : "Show Prices";
  render();
});

// Theme toggle
const themeToggle = document.getElementById("themeToggle");
const savedTheme = localStorage.getItem("menu-theme") || "dark";
document.documentElement.setAttribute("data-theme", savedTheme);
themeToggle.textContent = savedTheme === "dark" ? "Light" : "Dark";

themeToggle.addEventListener("click", () => {
  const current = document.documentElement.getAttribute("data-theme");
  const next = current === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("menu-theme", next);
  themeToggle.textContent = next === "dark" ? "Light" : "Dark";
});

// Initial render
render();
</script>
</body>
</html>
